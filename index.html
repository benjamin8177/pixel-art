<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pixel Art</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>Pixel Art Generator</h1>
        <div class="controls">
            <input type="number" id="grid-width" placeholder="Width" value="16" min="1" max="50">
            <input type="number" id="grid-height" placeholder="Height" value="16" min="1" max="50">
            <button id="create-grid">Create Grid</button>
            <input type="color" id="color-picker" value="#e94560">
            <button id="clear-grid">Clear</button>
        </div>
        
    </div>
    <div class="canvas-container">
        <div id="pixel-canvas"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
